name: 🧪 Run Autotests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: 📚 E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: library_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/library_test
      JWT_SECRET: github-actions-test-secret-key-32chars-long
      CORS_ORIGIN: http://localhost:3001
      PORT: 4000

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install root dependencies
        run: npm install

      - name: 📦 Install autotest dependencies
        working-directory: autotests
        run: npm install

      - name: 🎭 Install Playwright browsers
        working-directory: autotests
        run: npx playwright install chromium --with-deps

      - name: 🗄️ Setup database
        run: |
          cd server
          npx prisma generate
          npx prisma migrate deploy --config prisma/prisma.config.ts
          cd ..
          npx tsx server/prisma/seed.ts

      - name: 🚀 Start backend server
        run: |
          npm run dev --workspace=server &
          sleep 4
          curl -f http://localhost:4000/api/health

      - name: 🌐 Start frontend
        run: |
          npm run dev --workspace=web &
          sleep 10
          curl -sf http://localhost:3001/api/health || echo "Waiting for frontend..."
          sleep 5

      - name: 🧪 Run E2E tests
        working-directory: autotests
        run: npx playwright test
        continue-on-error: true

      - name: 📁 Ensure report exists
        if: always()
        run: |
          if [ ! -f autotests/report/index.html ]; then
            mkdir -p autotests/report
            echo '<html><body><h1>📚 No test report generated</h1><p>Tests may not have run. Check the workflow logs.</p></body></html>' > autotests/report/index.html
          fi

      - name: 📊 Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: autotests/report/
          retention-days: 30

      - name: 📸 Upload test results (screenshots, traces)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: autotests/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: 📄 Upload report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: autotests/report/

  deploy-report:
    name: 🌐 Deploy Report to Pages
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
